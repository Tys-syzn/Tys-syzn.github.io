<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智学刷题 - 初中在线测评系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body { font-family: 'Noto Sans SC', sans-serif; }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .subject-math { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .subject-physics { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .subject-chemistry { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .subject-english { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .subject-chinese { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .subject-history { background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); }
        .subject-biology { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); }
        .subject-geo { background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%); }
        
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }
        .option-correct {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .option-wrong {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        
        .progress-ring {
            transform: rotate(-90deg);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 登录/注册模态框 -->
    <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 m-4 fade-in">
            <div class="text-center mb-6">
                <div class="w-16 h-16 gradient-bg rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-graduation-cap text-white text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800" id="authTitle">登录</h2>
                <p class="text-gray-500 mt-1">智学刷题 - 初中在线测评系统</p>
            </div>
            
            <form id="authForm" class="space-y-4">
                <div id="nameField" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
                    <input type="text" id="userName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="请输入昵称">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="请输入用户名" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="请输入密码" required>
                </div>
                
                <div id="inviteField" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">邀请码</label>
                    <input type="text" id="inviteCode" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="请输入邀请码">
                    <p class="text-xs text-gray-500 mt-1">需要管理员提供的邀请码才能注册</p>
                </div>
                
                <button type="submit" class="w-full gradient-bg text-white py-2.5 rounded-lg font-medium hover:opacity-90 transition-opacity">
                    <span id="authBtnText">登录</span>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    <span id="authSwitchText">还没有账号？</span>
                    <button onclick="toggleAuthMode()" class="text-indigo-600 font-medium hover:underline" id="authSwitchBtn">立即注册</button>
                </p>
            </div>
            
            <div class="mt-4 p-3 bg-blue-50 rounded-lg">
                <p class="text-xs text-blue-700 text-center">
                    <i class="fas fa-info-circle mr-1"></i>
                    演示账号: admin / admin (管理员) | student / 123456
                </p>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="app" class="hidden">
        <!-- 顶部导航 -->
        <nav class="glass-effect sticky top-0 z-40 border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <div class="w-10 h-10 gradient-bg rounded-lg flex items-center justify-center mr-3">
                            <i class="fas fa-graduation-cap text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold text-gray-800">智学刷题</span>
                        <span class="ml-2 px-2 py-0.5 bg-indigo-100 text-indigo-700 text-xs rounded-full" id="userRoleBadge">学生</span>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="hidden md:flex items-center space-x-2 text-sm text-gray-600">
                            <i class="fas fa-fire text-orange-500"></i>
                            <span id="streakCount">连续 3 天</span>
                        </div>
                        <div class="hidden md:flex items-center space-x-2 text-sm text-gray-600">
                            <i class="fas fa-star text-yellow-500"></i>
                            <span id="totalPoints">1250 分</span>
                        </div>
                        <div class="relative group">
                            <button class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 transition-colors">
                                <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-user text-indigo-600 text-sm"></i>
                                </div>
                                <span class="text-sm font-medium text-gray-700" id="navUsername">用户名</span>
                                <i class="fas fa-chevron-down text-xs text-gray-400"></i>
                            </button>
                            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                                <a onclick="showProfile()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer">
                                    <i class="fas fa-user-circle mr-2"></i>个人中心
                                </a>
                                <a onclick="showHistory()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer">
                                    <i class="fas fa-history mr-2"></i>做题记录
                                </a>
                                <div id="adminMenuItem" class="hidden border-t border-gray-100">
                                    <a onclick="showAdmin()" class="block px-4 py-2 text-sm text-indigo-600 hover:bg-gray-50 cursor-pointer">
                                        <i class="fas fa-cog mr-2"></i>管理后台
                                    </a>
                                </div>
                                <div class="border-t border-gray-100">
                                    <a onclick="logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-50 cursor-pointer">
                                        <i class="fas fa-sign-out-alt mr-2"></i>退出登录
                                    </a>
                                </div>
